version: '3.8'

services:
  mongodb:
    image: mongo:7
    container_name: delivery-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    environment:
      MONGO_INITDB_DATABASE: delivery-verification

  backend:
    build: ./backend
    container_name: delivery-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      PORT: 5000
      MONGO_URI: mongodb://mongodb:27017/delivery-verification
      JWT_SECRET: your_super_secret_key_change_this
      EMAIL_USER: your_email@gmail.com
      EMAIL_PASS: your_app_password
      NODE_ENV: development
      CLIENT_URL: http://localhost:3000
    depends_on:
      - mongodb

  frontend:
    build: ./frontend
    container_name: delivery-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://localhost:5000
    depends_on:
      - backend

volumes:
  mongo_data:
